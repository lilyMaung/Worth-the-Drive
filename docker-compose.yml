

version: "3.8"

services:

  backend:
    build: .
    container_name: worth-the-drive-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: worth-the-drive-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend